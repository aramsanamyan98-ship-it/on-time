services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ontime
      POSTGRES_PASSWORD: ontime
      POSTGRES_DB: ontime
    ports:
      - "5432:5432"
    volumes:
      - ontime_postgres_data:/var/lib/postgresql/data

volumes:
  ontime_postgres_data:
